[project]
name = "qhld-data"
version = "1.1.0"
description = "QHLD Data"
authors = [{ name = "pr3ssh" }]
requires-python = ">=3.12"

dependencies = [
    "marshmallow-mongoengine==0.31.2",
    "mongoengine==0.29.1",
    "pymongo==4.10.1",
    "regex==2024.11.6",
    "six==1.16.0",
    "natsort==8.4.0",
    "python-slugify==8.0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tipi_data"]
